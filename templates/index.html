<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h1>Enter System</h1>

    <div id="status-message" style="margin-bottom: 15px;"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const msgBox = document.getElementById('status-message');
    const msg = params.get('msg');
    const error = params.get('error');
    const user = params.get('user');

    let content = "";
    let style = "padding: 12px; border-radius: 8px; font-size: 0.9em; text-align: center; border: 1px solid ";

    if (msg === 'registered') {
        content = "Registered ✅";
        style += "#22c55e; background: rgba(34, 197, 94, 0.1); color: #4ade80;";
    } else if (msg === 'welcome') {
        content = `🎉 Welcome, ${user}!`;
        style += "#38bdf8; background: rgba(56, 189, 248, 0.1); color: #38bdf8;";
    } else if (error === 'login_failed') {
        content = "❌ Incorrect password";
        style += "#ef4444; background: rgba(239, 68, 68, 0.1); color: #f87171;";
    }

    if (content) {
        msgBox.innerHTML = `<div style="${style}">${content}</div>`;
        setTimeout(() => window.history.replaceState({}, document.title, "/"), 3000);
    }
</script>
<form action="/login" method="post">
    <div style="margin-bottom: 15px;">
        <input type="text" name="username" placeholder="login" required 
               style="padding: 10px; border-radius: 5px; border: none; width: 100%;">
    </div>
    <div style="margin-bottom: 15px;">
        <input type="password" name="password" placeholder="Password" required 
               style="padding: 10px; border-radius: 5px; border: none; width: 100%;">
    </div>
    <button type="submit" 
            style="background: #38bdf8; color: #0f172a; padding: 10px 20px; border: none; border-radius: 5px; width: 100%; font-weight: bold; cursor: pointer;">
        Log in
    </button>
    <div style="margin-top: 20px;">
    <span style="color: #94a3b8;">No account?</span>
    <a href="/register" style="color: #38bdf8; text-decoration: none; font-weight: bold;">Create</a>
</div>
</form>

</body>
</html>
